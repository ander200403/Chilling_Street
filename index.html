<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chilling Street — Oficial</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── Tarjeta fijada Chilling Studio ── */
    #pinnedGrid {
      padding-bottom: 0 !important;
      margin-bottom: -2px; /* une visualmente con el grid de abajo */
    }
    .pinned-studio-card {
      border-color: rgba(255,255,255,0.28);
      position: relative;
      overflow: hidden;
    }
    .pinned-studio-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 1;
    }
    .pinned-studio-card:hover {
      border-color: rgba(255,255,255,0.55);
      box-shadow: 0 0 24px rgba(255,255,255,0.08);
    }
    .pinned-studio-card .card-img {
      transition: transform 0.6s ease;
    }
    .pinned-studio-card:hover .card-img {
      transform: scale(1.04);
    }
  </style>
</head>
<body>

  <div class="bg-image"></div>
  <div class="bg-overlay"></div>

  <header>
    <div class="logo-wrap">
      <img src="https://lh3.googleusercontent.com/d/1fPhQYMIdQGYn0HEzKTy4Kb44C_j9DhuJ" class="logo-img" alt="Chilling Street Logo" onerror="this.style.display='none'">
    </div>
    <p class="welcome-text">STREETWEAR CULTURE & PREMIUM GARMENTS.</p>
  </header>

  <div class="top-carousel-section" id="topCarouselSection" style="display:none;">
    <h2 class="carousel-title">LATEST DROPS</h2>
    <div class="carousel-track" id="carouselTrack"></div>
  </div>

  <div class="controls">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Buscar prenda o colección...">
    </div>
    <select id="genreFilter" class="genre-filter" onchange="applyFilters()">
      <option value="">Todas las categorías</option>
    </select>
    <select id="sortSelect" class="sort-select" onchange="applyFilters()">
      <option value="">Ordenar</option>
      <option value="price-asc">Precio: menor a mayor</option>
      <option value="price-desc">Precio: mayor a menor</option>
    </select>
  </div>

  <div class="results-bar">
    <span class="results-count" id="resultsCount"></span>
  </div>

  <div class="favs-section" id="favsSection">
    <div class="favs-header">
      <span class="favs-title">WISHLIST</span>
      <button class="favs-clear" onclick="clearFavs()">Limpiar</button>
    </div>
    <div class="favs-grid" id="favsGrid"></div>
  </div>

  <main>
    <!-- Tarjeta fija: Chilling Studio -->
    <div class="grid" id="pinnedGrid" style="margin-bottom: 0;">
      <div class="card pinned-studio-card" onclick="window.location.href='studio.html'" style="cursor:pointer;">
        <div class="card-wrap">
          <span class="special-badge" style="background: linear-gradient(135deg,#fff 0%,#ccc 100%); color:#000;">✦ EXCLUSIVO</span>
          <img src="https://lh3.googleusercontent.com/d/1mAGb5BqOmhwDQshw1KrA9q10zOMGINWr"
               class="card-img loaded"
               alt="Chilling Studio"
               onerror="this.src='https://placehold.co/400x500/111/333?text=STUDIO'">
        </div>
        <div class="card-body">
          <div class="card-brand">CHILLING</div>
          <div class="card-title" style="font-size:1.05rem;">STUDIO — PERSONALIZA TU PRENDA</div>
          <div class="price-wrap">
            <span class="card-price" style="font-size:0.9rem; letter-spacing:1px;">DISEÑO EXCLUSIVO</span>
          </div>
          <button class="btn-view" style="background: #fff; color: #000; border: none;">
            ⚡ CREAR AHORA
          </button>
        </div>
      </div>
    </div>

    <div class="grid" id="skeletonGrid"></div>
    <div class="grid" id="productGrid" style="display:none;"></div>
  </main>

  <div id="modal" class="modal" onclick="closeModal()">
    <div class="modal-content glass-panel" onclick="event.stopPropagation()">
      <span class="modal-close" onclick="closeModal()">×</span>
      
      <div class="modal-img-wrap">
        <span id="modalCover" class="cover-badge" style="display:none;"></span>
        <img id="modalImg" src="" class="modal-img" alt="Prenda">
      </div>

      <h2 id="modalTitle" class="modal-title-text"></h2>
      <p id="modalAuthor" class="modal-brand-text"></p>
      
      <div id="modalPrice" class="modal-price-display"></div>
      
      <div class="variants-container" id="variantsContainer">
        <div class="variant-group" id="colorGroup" style="display:none;">
          <span class="variant-label">Color: <span id="selectedColorName" class="selected-val"></span></span>
          <div class="color-options" id="colorOptions"></div>
        </div>
        
        <div class="variant-group" id="sizeGroup" style="display:none;">
          <span class="variant-label">Talla: <span id="selectedSizeName" class="selected-val">Selecciona una</span></span>
          <div class="size-options" id="sizeOptions"></div>
        </div>
      </div>

      <div id="modalGenres" class="modal-genres"></div>
      <p id="modalDesc" class="modal-description"></p>
      
      <button class="modal-btn-add" id="btnAddToCart" onclick="addToCartFromModal()">AÑADIR AL CARRITO</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <div id="sidebar" class="sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:15px; margin-bottom:15px;">
      <h2 style="font-family:'Montserrat', sans-serif; color:#fff; font-size:1.4rem; font-weight:900; letter-spacing:1px;">TU ORDEN</h2>
      <span onclick="toggleCart()" style="cursor:pointer; font-size:2rem; color:var(--muted); line-height:1;">×</span>
    </div>
    
    <div id="cartList" class="cart-list"></div>
    
    <div class="cart-notes-wrap" id="cartNotesWrap" style="display:none;">
      <label class="cart-notes-label">INSTRUCCIONES ADICIONALES</label>
      <textarea id="cartNotes" class="cart-notes" placeholder="Ej: Entregar por la tarde..."></textarea>
    </div>

    <div class="cart-total-row" id="cartTotalRow" style="display:none;">
      <span class="cart-total-label">TOTAL</span>
      <span class="cart-total-amount" id="cartTotal"></span>
    </div>
    <button class="checkout-btn" id="btnCheckout" style="display:none;" onclick="sendOrder()">PROCESAR PAGO ⚡</button>
  </div>

  <button class="cart-fab" onclick="toggleCart()" aria-label="Abrir carrito">
    🛒 <span id="cartBadge">0</span>
  </button>

  <div class="social-bubble" id="socialBubble" onclick="toggleSocialMenu()" aria-label="Redes Sociales">
    <img id="bubbleIcon" src="https://lh3.googleusercontent.com/d/1eKil-1X4fIxl99j4ySccZWsaPxEqJ6ui" alt="Social">
  </div>

  <div id="socialMenu" class="social-menu" onclick="toggleSocialMenu()">
    <div class="social-menu-content glass-panel" onclick="event.stopPropagation()">
      <h3 style="color:var(--accent); margin-bottom:15px; font-family:'Montserrat',sans-serif; font-size: 1.2rem; font-weight:900; letter-spacing:1px;">NUESTRA COMUNIDAD</h3>
      <a href="https://www.instagram.com/chilling_street_shop?igsh=OXBiNmt1Zzl4YWxt&utm_source=qr" target="_blank" class="social-link">📸 Instagram</a>
      <a href="https://www.tiktok.com/@chillingstreetshop?_r=1&_t=ZS-96jBBjUu0U4" target="_blank" class="social-link">🎵 TikTok</a>
      <button class="checkout-btn" style="margin-top:15px; padding: 12px; font-size: 0.8rem;" onclick="toggleSocialMenu()">Cerrar</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
